name: "Smart Download Artifact"
description: "Download GitHub Actions artifacts by name, comma-separated IDs, or glob pattern — a thin wrapper over actions/download-artifact covering all selection modes."

inputs:
  name:
    description: "Artefact name"
    required: false
    default: ""
  artifact-ids:
    description: "IDs artifacts (comma-separated)"
    required: false
    default: ""
  pattern:
    description: "Glob pattern to match artifact names"
    required: false
    default: ""
  path:
    description: "Folder to download artifacts to"
    required: false
    default: "artifacts"

runs:
  using: "composite"
  steps:
    - name: Download by name
      if: ${{ inputs.name != '' }}
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c #v8.0.1
      with:
        name: ${{ inputs.name }}
        path: ${{ inputs.path }}

    - name: Download by IDs
      if: ${{ inputs.artifact-ids != '' }}
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c #v8.0.1
      with:
        artifact-ids: ${{ inputs.artifact-ids }}
        path: ${{ inputs.path }}

    - name: Download by pattern
      if: ${{ inputs.pattern != '' }}
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c #v8.0.1
      with:
        pattern: ${{ inputs.pattern }}
        path: ${{ inputs.path }}
