---
name: Maven Monorepo Release
description: >
  Release a single Maven component inside a monorepo. Bumps the version
  according to version-type (patch/minor/major), runs mvn release:prepare +
  release:perform, creates a GitHub Release tagged as
  `<component>-<release-version>`, and optionally builds and pushes a Docker
  image when a Dockerfile is present.

inputs:
  component:
    description: >
      Name of the component (subdirectory name under the repository root).
      Used as the Git tag / GitHub Release prefix.
    required: true
  version-type:
    description: "Version bump type: patch, minor, or major."
    required: false
    default: "patch"
  ref:
    description: "Branch to create the release from."
    required: false
    default: "main"
  token:
    description: "GitHub token with contents:write and packages:write permissions."
    required: true
  maven-args:
    description: "Extra Maven arguments passed to every mvn invocation."
    required: false
    default: "-DskipTests=true -Dmaven.javadoc.skip=true -B"
  server-id:
    description: "Maven settings.xml server ID for the deploy repository."
    required: false
    default: "github"
  java-version:
    description: "Java version for actions/setup-java."
    required: false
    default: "21"
  maven-version:
    description: "Maven version to install (leave empty to use the runner default)."
    required: false
    default: ""
  profile:
    description: "Maven profile to activate during the release."
    required: false
    default: ""
  maven-user:
    description: "Username for the Maven deploy server."
    required: false
    default: ""
  maven-password:
    description: "Password / token for the Maven deploy server."
    required: false
    default: ""
  gpg-private-key:
    description: "Armoured GPG private key for artifact signing."
    required: false
    default: ""
  gpg-passphrase:
    description: "Passphrase for the GPG private key."
    required: false
    default: ""
  dockerfile:
    description: >
      Path to the Dockerfile relative to the component directory.
      When present (and the file exists), the Docker image is built and pushed
      to ghcr.io after the Maven release.
    required: false
    default: "Dockerfile"
  build-context:
    description: "Docker build context relative to the component directory."
    required: false
    default: "."
  docker-platforms:
    description: "Comma-separated list of Docker target platforms."
    required: false
    default: "linux/amd64"
  bump-dependencies-after-release:
    description: >
      When true, re-deploy the post-release SNAPSHOT and update org.qubership
      dependencies to the next snapshot in the component pom.xml.
    required: false
    default: "false"
  dry-run:
    description: >
      When true, builds the current SNAPSHOT without tagging or pushing;
      no GitHub Release or Docker push is performed.
    required: false
    default: "true"

outputs:
  release-version:
    description: "The Maven version that was released (e.g. 1.2.3)."
    value: ${{ steps.release.outputs.RELEASE_VERSION }}
  release-tag:
    description: "The Git tag created (e.g. my-service-1.2.3)."
    value: ${{ steps.release.outputs.RELEASE_TAG }}
  docker-image:
    description: "Full Docker image reference pushed (e.g. ghcr.io/org/my-service:1.2.3)."
    value: ${{ steps.docker.outputs.DOCKER_IMAGE }}

runs:
  using: "composite"
  steps:
    # ── Validation ────────────────────────────────────────────────────────────
    - name: Validate inputs
      shell: bash
      run: |
        . "${GITHUB_ACTION_PATH}/action-script.sh"
        check_version_type "${{ inputs.version-type }}"
        check_component    "${{ inputs.component }}"
        check_token        "${{ inputs.token }}"

    # ── Resolve working directory ─────────────────────────────────────────────
    - name: Set working directory
      shell: bash
      run: |
        echo "WORKING_DIR=${{ github.workspace }}/${{ inputs.component }}" >> "$GITHUB_ENV"

    # ── Java & Maven ──────────────────────────────────────────────────────────
    - name: Set up JDK
      uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 #v5.2.0
      with:
        java-version: ${{ inputs.java-version }}
        distribution: "temurin"
        server-id: ${{ inputs.server-id }}
        server-username: MAVEN_USERNAME
        server-password: MAVEN_PASSWORD
        gpg-private-key: ${{ inputs.gpg-private-key }}
        gpg-passphrase: MAVEN_GPG_PASSPHRASE

    - name: Set up Maven
      if: ${{ inputs.maven-version != '' }}
      uses: stCarolas/setup-maven@d6af6abeda15e98926a57b5aa970a96bb37f97d1
      with:
        maven-version: ${{ inputs.maven-version }}

    # ── Checkout the component ────────────────────────────────────────────────
    - name: Checkout component
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
      with:
        ref: ${{ inputs.ref }}
        path: ${{ inputs.component }}
        token: ${{ inputs.token }}
        persist-credentials: true

    # ── Debug info ────────────────────────────────────────────────────────────
    - name: Debug info
      shell: bash
      run: |
        echo "Component:         ${{ inputs.component }}"
        echo "Version type:      ${{ inputs.version-type }}"
        echo "Working directory: ${{ env.WORKING_DIR }}"
        echo "Dry run:           ${{ inputs.dry-run }}"
        java -version
        mvn -version

    # ── Maven cache ───────────────────────────────────────────────────────────
    - name: Cache local Maven repository
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae #v5.0.5
      with:
        path: ~/.m2/repository
        key: maven-${{ runner.os }}-${{ hashFiles(format('{0}/**/pom.xml', inputs.component)) }}
        restore-keys: |
          maven-${{ runner.os }}-

    # ── Compute release version (dry-run skips actual bump) ───────────────────
    - name: Compute release version
      id: compute-version
      shell: bash
      env:
        WORKING_DIR: ${{ env.WORKING_DIR }}
        VERSION_TYPE: ${{ inputs.version-type }}
      run: |
        . "${GITHUB_ACTION_PATH}/action-script.sh"
        compute_release_version
        echo "RELEASE_VERSION=${RELEASE_VERSION}"           >> "$GITHUB_OUTPUT"
        echo "RELEASE_VERSION=${RELEASE_VERSION}"           >> "$GITHUB_ENV"
        echo "RELEASE_VERSION_ARG=${RELEASE_VERSION_ARG}"   >> "$GITHUB_ENV"
        echo "NEXT_DEV_VERSION=${NEXT_DEV_VERSION}"         >> "$GITHUB_ENV"

    # ── Maven release:prepare + release:perform ───────────────────────────────
    - name: Release Maven component
      id: release
      shell: bash
      env:
        MAVEN_USERNAME: ${{ inputs.maven-user }}
        MAVEN_PASSWORD: ${{ inputs.maven-password }}
        MAVEN_GPG_PASSPHRASE: ${{ inputs.gpg-passphrase }}
        GITHUB_TOKEN: ${{ inputs.token }}
        COMPONENT: ${{ inputs.component }}
        VERSION_TYPE: ${{ inputs.version-type }}
        MVN_ARGS: ${{ inputs.maven-args }}
        DRY_RUN: ${{ inputs.dry-run }}
        PROFILE: ${{ inputs.profile }}
        WORKING_DIR: ${{ env.WORKING_DIR }}
        RELEASE_VERSION: ${{ env.RELEASE_VERSION }}
        RELEASE_VERSION_ARG: ${{ env.RELEASE_VERSION_ARG }}
      run: |
        . "${GITHUB_ACTION_PATH}/action-script.sh"
        set_profile
        release_component

    # ── Create GitHub Release ─────────────────────────────────────────────────
    - name: Create GitHub Release
      if: ${{ inputs.dry-run == 'false' }}
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.token }}
        COMPONENT: ${{ inputs.component }}
        RELEASE_VERSION: ${{ steps.release.outputs.RELEASE_VERSION }}
        RELEASE_TAG: ${{ steps.release.outputs.RELEASE_TAG }}
        RELEASE_REF: ${{ inputs.ref }}
        DRY_RUN: ${{ inputs.dry-run }}
      run: |
        . "${GITHUB_ACTION_PATH}/action-script.sh"
        create_github_release

    # ── Docker build + push (only when Dockerfile exists) ────────────────────
    - name: Build and push Docker image
      id: docker
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.token }}
        COMPONENT: ${{ inputs.component }}
        RELEASE_VERSION: ${{ steps.release.outputs.RELEASE_VERSION }}
        RELEASE_TAG: ${{ steps.release.outputs.RELEASE_TAG }}
        DOCKERFILE: ${{ inputs.dockerfile }}
        BUILD_CONTEXT: ${{ inputs.build-context }}
        DRY_RUN: ${{ inputs.dry-run }}
        WORKING_DIR: ${{ env.WORKING_DIR }}
      run: |
        . "${GITHUB_ACTION_PATH}/action-script.sh"
        build_and_push_docker_image

    # ── Post-release dependency bump ──────────────────────────────────────────
    - name: Checkout component at new SNAPSHOT
      if: ${{ inputs.dry-run == 'false' && inputs.bump-dependencies-after-release == 'true' }}
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
      with:
        ref: ${{ inputs.ref }}
        path: ${{ inputs.component }}
        token: ${{ inputs.token }}
        persist-credentials: true

    - name: Bump dependencies to next snapshot
      if: ${{ inputs.dry-run == 'false' && inputs.bump-dependencies-after-release == 'true' }}
      shell: bash
      env:
        MAVEN_USERNAME: ${{ inputs.maven-user }}
        MAVEN_PASSWORD: ${{ inputs.maven-password }}
        MAVEN_GPG_PASSPHRASE: ${{ inputs.gpg-passphrase }}
        GITHUB_TOKEN: ${{ inputs.token }}
        COMPONENT: ${{ inputs.component }}
        MVN_ARGS: ${{ inputs.maven-args }}
        DRY_RUN: ${{ inputs.dry-run }}
        PROFILE: ${{ inputs.profile }}
        WORKING_DIR: ${{ env.WORKING_DIR }}
      run: |
        . "${GITHUB_ACTION_PATH}/action-script.sh"
        set_profile
        bump_dependencies_versions
