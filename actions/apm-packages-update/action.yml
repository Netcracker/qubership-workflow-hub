name: Update APM packages
description: Updates APM-managed packages in the current repository and creates a pull request with the changes.

inputs:
  branch:
    description: Target branch to update
    required: false
    default: main
  dry-run:
    description: Run APM update in dry-run mode and skip pull request creation
    required: false
    default: "false"
  debug:
    description: Print runner and APM diagnostics before updating packages
    required: false
    default: "false"
  target:
    description: Optional APM target override; accepts a single target or comma-separated list
    required: false
    default: ""
  token:
    description: GitHub token with permission to create branches and pull requests
    required: true

runs:
  using: composite
  steps:
    - name: Install yq
      shell: bash
      run: |
        sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/download/v4.53.3/yq_linux_amd64
        sudo chmod +x /usr/local/bin/yq
        yq --version

    - name: Resolve APM target
      id: resolve-target
      shell: bash
      env:
        INPUT_APM_TARGET: ${{ inputs.target }}
      run: |
        set -eu
        if [ ! -f apm.yml ]; then
          echo "apm.yml not found"
          exit 1
        fi
        # Migrate singular 'target:' to canonical plural 'targets:'
        if [ "$(yq '.target' apm.yml)" != "null" ]; then
          yq -i '.targets = .target | del(.target)' apm.yml
        fi

        if [ -n "$INPUT_APM_TARGET" ]; then
          resolved_target="$INPUT_APM_TARGET"
        else
          resolved_target="$(yq -r '(.targets // []) | join(",")' apm.yml)"
        fi

        OLDIFS="$IFS"
        IFS=','
        read -r -a raw_targets <<< "$resolved_target"
        IFS="$OLDIFS"

        normalized_targets=()
        for target in "${raw_targets[@]}"; do
          target="${target#"${target%%[![:space:]]*}"}"
          target="${target%"${target##*[![:space:]]}"}"
          if [ -n "$target" ]; then
            normalized_targets+=("$target")
          fi
        done

        if [ "${#normalized_targets[@]}" -eq 0 ]; then
          echo "apm.yml does not define any APM targets and no target override was provided"
          exit 1
        fi

        resolved_target="$(IFS=,; echo "${normalized_targets[*]}")"

        echo "Resolved APM target: $resolved_target"
        echo "target=$resolved_target" >> "$GITHUB_OUTPUT"

    - name: Setup APM
      uses: microsoft/apm-action@e5650fb81c4b5965090a17bd1ed1956071e95d17  # v1.9.1
      with:
        setup-only: "true"
        apm-version: "0.15.0"

    - name: Debug APM target resolution
      if: ${{ inputs.debug == 'true' }}
      shell: bash
      env:
        APM_TARGET: ${{ steps.resolve-target.outputs.target }}
      run: |
        set -eu
        echo "== Workspace =="
        pwd
        ls -la
        echo
        echo "== Runner =="
        printf 'RUNNER_OS=%s\n' "${RUNNER_OS:-}"
        printf 'RUNNER_ARCH=%s\n' "${RUNNER_ARCH:-}"
        printf 'CI=%s\n' "${CI:-}"
        printf 'GITHUB_ACTIONS=%s\n' "${GITHUB_ACTIONS:-}"
        printf 'GITHUB_WORKSPACE=%s\n' "${GITHUB_WORKSPACE:-}"
        printf 'HOME=%s\n' "${HOME:-}"
        echo
        echo "== Harness markers =="
        for path in .claude .github .github/instructions .agents .codex .cursor .gemini .opencode .windsurf AGENTS.md CLAUDE.md GEMINI.md; do
          if [ -e "$path" ]; then
            printf '[present] %s\n' "$path"
          else
            printf '[missing] %s\n' "$path"
          fi
        done
        echo
        echo "== apm.yml =="
        cat apm.yml
        echo
        echo "== APM version =="
        apm --version
        echo
        echo "== Resolved targets =="
        apm targets
        echo
        echo "== Dry-run without explicit target =="
        apm update --yes --dry-run -v
        echo
        echo "== Dry-run with explicit target =="
        apm update --yes --dry-run -v --target "$APM_TARGET"

    - name: Update APM packages
      shell: bash
      env:
        APM_DRY_RUN: ${{ inputs.dry-run }}
        APM_TARGET: ${{ steps.resolve-target.outputs.target }}
      run: |
        set -eu
        args=(update --yes --target "$APM_TARGET")
        if [ "$APM_DRY_RUN" = "true" ]; then
          args+=(--dry-run)
        fi
        apm "${args[@]}"

    - name: Create Pull Request
      if: ${{ inputs.dry-run != 'true' }}
      id: create-pr
      uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1  # v8.1.1
      with:
        token: ${{ inputs.token }}
        base: ${{ inputs.branch }}
        branch: chore/update-apm-packages
        delete-branch: true
        title: "chore: update APM packages"
        commit-message: "chore: update APM packages"
        body: |
          This PR updates APM-managed packages using:

          ```bash
          apm update --yes --target ${{ steps.resolve-target.outputs.target }}
          ```

          Target branch: `${{ inputs.branch }}`
          Resolved APM target: `${{ steps.resolve-target.outputs.target }}`

          Please review changes in:
          - `apm.yml`
          - `apm.lock.yaml`
          - deployed APM files

    - name: Log result
      shell: bash
      run: |
        if [ "${{ inputs.dry-run }}" = "true" ]; then
          echo "Dry-run mode enabled, pull request creation skipped"
          echo "Dry-run mode enabled, pull request creation skipped" >> "$GITHUB_STEP_SUMMARY"
          exit 0
        fi
        if [ "${{ steps.create-pr.outputs.pull-request-url }}" != "" ]; then
          echo "::notice title=PR created::${{ steps.create-pr.outputs.pull-request-url }}"
          echo "PR created: ${{ steps.create-pr.outputs.pull-request-url }}" >> "$GITHUB_STEP_SUMMARY"
        else
          echo "No changes detected, PR not created"
          echo "No changes detected, PR not created" >> "$GITHUB_STEP_SUMMARY"
        fi
