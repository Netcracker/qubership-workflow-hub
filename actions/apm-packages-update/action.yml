name: Update APM packages
description: Updates APM-managed packages in the current repository and creates a pull request with the changes.

inputs:
  branch:
    description: Target branch to update
    required: false
    default: main
  dry-run:
    description: Run APM update in dry-run mode and skip pull request creation
    required: false
    default: "false"
  debug:
    description: Print runner and APM diagnostics before updating packages
    required: false
    default: "false"
  target:
    description: Optional APM target override; accepts a single target or comma-separated list
    required: false
    default: ""
  token:
    description: GitHub token with permission to create branches and pull requests
    required: true

runs:
  using: composite
  steps:
    - name: Setup APM
      uses: microsoft/apm-action@e5650fb81c4b5965090a17bd1ed1956071e95d17  # v1.9.1
      with:
        setup-only: "true"
        apm-version: "1.10.0"

    - name: Debug APM update context
      if: ${{ inputs.debug == 'true' }}
      shell: bash
      run: |
        set -eu
        echo "== Workspace =="
        pwd
        ls -la
        echo
        echo "== Runner =="
        printf 'RUNNER_OS=%s\n' "${RUNNER_OS:-}"
        printf 'RUNNER_ARCH=%s\n' "${RUNNER_ARCH:-}"
        printf 'CI=%s\n' "${CI:-}"
        printf 'GITHUB_ACTIONS=%s\n' "${GITHUB_ACTIONS:-}"
        printf 'GITHUB_WORKSPACE=%s\n' "${GITHUB_WORKSPACE:-}"
        printf 'HOME=%s\n' "${HOME:-}"
        echo
        echo "== Harness markers =="
        for path in .claude .github .github/instructions .agents .codex .cursor .gemini .opencode .windsurf AGENTS.md CLAUDE.md GEMINI.md; do
          if [ -e "$path" ]; then
            printf '[present] %s\n' "$path"
          else
            printf '[missing] %s\n' "$path"
          fi
        done
        echo
        echo "== apm.yml =="
        cat apm.yml
        echo
        echo "== APM version =="
        apm --version
        echo
        echo "== Resolved targets =="
        apm targets
        echo
        echo "== Dry-run update command =="
        args=(update --yes --dry-run -v)
        if [ -n "${{ inputs.target }}" ]; then
          args+=(--target "${{ inputs.target }}")
        fi
        apm "${args[@]}"

    - name: Update APM packages
      shell: bash
      env:
        APM_DRY_RUN: ${{ inputs.dry-run }}
        APM_TARGET: ${{ inputs.target }}
      run: |
        set -eu
        args=(update --yes)
        if [ -n "$APM_TARGET" ]; then
          args+=(--target "$APM_TARGET")
        fi
        if [ "$APM_DRY_RUN" = "true" ]; then
          args+=(--dry-run)
        fi
        apm "${args[@]}"

    - name: Create Pull Request
      if: ${{ inputs.dry-run != 'true' }}
      id: create-pr
      uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1  # v8.1.1
      with:
        token: ${{ inputs.token }}
        base: ${{ inputs.branch }}
        branch: chore/update-apm-packages
        delete-branch: true
        title: "chore(apm): update packages"
        commit-message: "chore(apm): update packages"
        body: |
          ## Summary

          This PR updates APM-managed packages.
          The changes were generated automatically from workflow run `${{ github.run_id }}` against base branch `${{ inputs.branch }}`.

          ## Command

          ```bash
          apm update --yes${{ inputs.target != '' && format(' --target {0}', inputs.target) || '' }}
          ```

          ## Context

          - Repository: `${{ github.repository }}`
          - Base branch: `${{ inputs.branch }}`
          - Explicit target override: `${{ inputs.target || 'auto' }}`
          - Triggered by: `${{ github.actor }}`
          - Workflow run: `${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}`

          ## Review focus

          - `apm.yml`
          - `apm.lock.yaml`
          - deployed APM files

    - name: Log result
      shell: bash
      run: |
        if [ "${{ inputs.dry-run }}" = "true" ]; then
          echo "Dry-run mode enabled, pull request creation skipped"
          echo "Dry-run mode enabled, pull request creation skipped" >> "$GITHUB_STEP_SUMMARY"
          exit 0
        fi
        if [ "${{ steps.create-pr.outputs.pull-request-url }}" != "" ]; then
          echo "::notice title=PR created::${{ steps.create-pr.outputs.pull-request-url }}"
          echo "PR created: ${{ steps.create-pr.outputs.pull-request-url }}" >> "$GITHUB_STEP_SUMMARY"
        else
          echo "No changes detected, PR not created"
          echo "No changes detected, PR not created" >> "$GITHUB_STEP_SUMMARY"
        fi
