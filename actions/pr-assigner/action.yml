name: "PR Assigner"
description: "Auto-assign reviewers to a pull request from a config file or CODEOWNERS using Fisher-Yates shuffle, with optional self-assign and bot-allowlist support."
inputs:
  assignees:
    description: "List of assignees to assign the PR to."
    required: false
  shuffle:
    description: "Number of assignees to assign."
    default: "1"
    required: false
  configuration-path:
    description: "Path to the configuration file."
    required: false
  self-assign:
    description: "Whether to allow self-assigning if the PR author is in the assignees list."
    default: "false"
    required: false
runs:
  using: "node24"
  main: "dist/index.js"

branding:
  icon: "edit"
  color: "yellow"
