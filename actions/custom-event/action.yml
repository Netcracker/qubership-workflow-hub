name: "Custom Event Action"
description: "Trigger a repository_dispatch event in the same or another repository with a JSON payload, with payload validation before dispatch."
inputs:
  event-type:
    description: "The type of the custom event"
    required: true
  client-payload:
    description: "Payload to send with the event"
    required: false
    default: "{}"
  github-token:
    description: "GitHub Token"
    required: true
  owner:
    description: "Owner of the repository"
    required: false
  repo:
    description: "Repository name"
    required: false
outputs:
  status:
    description: "Status of the dispatch request"
runs:
  using: "node24"
  main: "dist/index.js"
