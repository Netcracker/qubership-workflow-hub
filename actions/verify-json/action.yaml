---

# To access files from action use path snippet
# ${GITHUB_WORKSPACE}/../../_actions/<action-owner>/<action-name>/<action-version>
# For custom action:
# ${GITHUB_WORKSPACE}/../../_actions/<repository-owner>/<repository-name>/<version>/<path-to-action>

name: "Verify JSON file"
description: "Validate a JSON file against a JSON Schema using jsonschema; fails the workflow on schema violations."

inputs:
  json-file:
    description: "Path to the JSON file"
    required: true
  schema-file:
    description: "Path to the schema file"
    required: true
outputs:
  valid:
    description: "Whether the JSON file is valid against the schema ('true' or 'false')"
    value: ${{ steps.validate.outputs.valid }}
runs:
  using: "composite"
  steps:
    - name: "Install dependencies"
      shell: bash
      run: |
        set -e
        python3 -m pip install --quiet "jsonschema>=4.0.0"

    - name: "Validate JSON"
      shell: python3 {0}
      id: validate
      env:
        JSON_FILE: ${{ inputs.json-file }}
        SCHEMA_FILE: ${{ inputs.schema-file }}
      run: |
        import json
        import sys
        import os
        from jsonschema import validate, ValidationError

        def write_output(valid):
            output_file = os.environ.get('GITHUB_OUTPUT')
            if output_file:
                with open(output_file, 'a') as f:
                    f.write(f"valid={'true' if valid else 'false'}\n")

        def write_summary(content):
            summary_file = os.environ.get('GITHUB_STEP_SUMMARY')
            if summary_file:
                with open(summary_file, 'a') as f:
                    f.write(content)

        json_file = os.environ.get('JSON_FILE')
        schema_file = os.environ.get('SCHEMA_FILE')

        if not json_file or not schema_file:
            print("❗ Missing required environment variables", file=sys.stderr)
            write_output(False)
            sys.exit(0)

        if not os.path.exists(json_file):
            print(f"❗ JSON file not found: {json_file}", file=sys.stderr)
            write_summary(f"❗ JSON file not found: {json_file}\n")
            write_output(False)
            sys.exit(0)

        if not os.path.exists(schema_file):
            print(f"❗ Schema file not found: {schema_file}", file=sys.stderr)
            write_summary(f"❗ Schema file not found: {schema_file}\n")
            write_output(False)
            sys.exit(0)

        try:
            with open(json_file, 'r') as f:
                instance = json.load(f)
            with open(schema_file, 'r') as f:
                schema = json.load(f)

            validate(instance=instance, schema=schema)
            print("✅ JSON file is valid.")
            write_summary("✅ JSON file is valid.\n")
            write_output(True)

        except ValidationError as e:
            print(f"❗ JSON validation failed: {str(e).split(chr(10))[0]}", file=sys.stderr)
            write_summary(f"❗ JSON validation failed.\n\n### jsonschema diagnostics\n\n```\n{e}\n```\n")
            write_output(False)

        except json.JSONDecodeError as e:
            print(f"❗ JSON decode error in {json_file}: {e}", file=sys.stderr)
            write_summary(f"❗ JSON decode error: {e}\n")
            write_output(False)

        except Exception as e:
            print(f"❗ Unexpected error: {e}", file=sys.stderr)
            write_summary(f"❗ Unexpected error: {e}\n")
            write_output(False)

    - name: "Fail on invalid"
      shell: bash
      env:
        VALID: ${{ steps.validate.outputs.valid }}
      run: |
        if [ "${VALID}" != "true" ]; then
          exit 1
        fi

