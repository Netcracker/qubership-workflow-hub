---

# To access files from action use path snippet
# ${GITHUB_WORKSPACE}/../../_actions/<action-owner>/<action-name>/<action-version>
# For custom action:
# ${GITHUB_WORKSPACE}/../../_actions/<repository-owner>/<repository-name>/<version>/<path-to-action>

name: "Verify JSON file"
description: "Validate a JSON file against a JSON Schema using jsonschema; fails the workflow on schema violations."

inputs:
  json-file:
    description: "Path to the JSON file"
    required: true
  schema-file:
    description: "Path to the schema file"
    required: true
outputs:
  is-valid:
    description: "JSON file valid or not"
    value: ${{ steps.validate.outputs.result }}
runs:
  using: "composite"
  steps:
    - name: "Checkout code"
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 #v7.0.0
      with:
        persist-credentials: false

    - name: "Install tools"
      shell: bash
      run: |
        sudo apt install -y python3-jsonschema

    - name: "Validate"
      shell: bash
      id: validate
      env:
        JSON_FILE: ${{ inputs.json-file }}
        SCHEMA_FILE: ${{ inputs.schema-file }}
      run: |
        set +e
        validate_res=$(jsonschema -i "${JSON_FILE}" "${SCHEMA_FILE}" 2>&1)
        validate=$?
        echo "result=${validate}" >> "$GITHUB_OUTPUT"
        if [ "${validate}" -ne 0 ]; then
          echo "❗ JSON validation failed."
          echo "❗ JSON validation failed." >> $GITHUB_STEP_SUMMARY
          echo "❗ Error: ${validate}"
          echo "❗ Error: ${validate}" >> $GITHUB_STEP_SUMMARY
          echo "${validate_res}"
          {
            echo "### jsonschema diagnostics"
            echo
            echo '```text'
            echo "${validate_res}"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          exit 1
        else
          echo "✅ JSON file is valid."
          echo "✅ JSON file is valid." >> $GITHUB_STEP_SUMMARY
        fi
