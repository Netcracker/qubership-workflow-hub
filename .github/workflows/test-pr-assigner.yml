name: TEST pr-assigner

on:
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e #v6.4.0
        with:
          node-version: '24'

      - name: Install dependencies
        working-directory: actions/pr-assigner
        run: npm install

      - name: Run unit tests
        working-directory: actions/pr-assigner
        run: npm test

      - name: Build dist
        working-directory: actions/pr-assigner
        run: npm run build

      - name: Verify dist exists
        run: test -f actions/pr-assigner/dist/index.js && echo "✅ dist/index.js exists"

  test-assign:
    name: Test PR Assign
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Run PR Assigner
        uses: ./actions/pr-assigner
        with:
          configuration-path: .github/pr-assigner-config.yml
          shuffle: "1"
          self-assign: "true"
        env:
          GH_TOKEN: ${{ github.token }}
