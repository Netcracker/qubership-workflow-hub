name: TEST pr-assigner

on:
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 #v7.0.0
        with:
          node-version: '24'

      - name: Install dependencies
        working-directory: actions/pr-assigner
        run: npm install

      - name: Run unit tests
        working-directory: actions/pr-assigner
        run: npm test

      - name: Build dist
        working-directory: actions/pr-assigner
        run: npm run build

      - name: Verify dist exists
        run: test -f actions/pr-assigner/dist/index.js && echo "✅ dist/index.js exists"

  test-assign:
    name: Test PR Assign
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Run PR Assigner
        uses: ./actions/pr-assigner
        with:
          configuration-path: .github/pr-assigner-config.yml
          shuffle: "1"
          self-assign: "true"
        env:
          GH_TOKEN: ${{ github.token }}
