name: TEST verify-json

on:
  workflow_dispatch: {}
  pull_request:
    paths:
      - "actions/verify-json/**"
      - ".github/workflows/test-verify-json.yml"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-valid-json:
    name: Test Valid JSON passes validation
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Create fixtures
        shell: bash
        run: |
          mkdir -p /tmp/fixtures
          cat > /tmp/fixtures/valid.json <<'EOF'
          {"name":"test-service","version":"1.0.0","port":8080}
          EOF
          cat > /tmp/fixtures/schema.json <<'EOF'
          {
            "$schema": "http://json-schema.org/draft-07/schema#",
            "type": "object",
            "required": ["name","version","port"],
            "properties": {
              "name":    {"type":"string"},
              "version": {"type":"string"},
              "port":    {"type":"integer","minimum":1,"maximum":65535}
            },
            "additionalProperties": false
          }
          EOF

      - name: Run verify-json
        id: verify
        uses: ./actions/verify-json
        with:
          json-file: /tmp/fixtures/valid.json
          schema-file: /tmp/fixtures/schema.json

      - name: Assert passed with is-valid=0
        shell: bash
        env:
          IS_VALID: ${{ steps.verify.outputs.is-valid }}
        run: |
          if [ "$IS_VALID" != "0" ]; then
            echo "FAIL: expected is-valid=0, got '$IS_VALID'"
            exit 1
          fi
          echo "PASS: is-valid=$IS_VALID"

  test-schema-violation:
    name: Test Schema violation fails the action
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Create fixtures
        shell: bash
        run: |
          mkdir -p /tmp/fixtures
          cat > /tmp/fixtures/invalid.json <<'EOF'
          {"name":"test-service","version":999,"port":99999}
          EOF
          cat > /tmp/fixtures/schema.json <<'EOF'
          {
            "$schema": "http://json-schema.org/draft-07/schema#",
            "type": "object",
            "required": ["name","version","port"],
            "properties": {
              "name":    {"type":"string"},
              "version": {"type":"string"},
              "port":    {"type":"integer","minimum":1,"maximum":65535}
            },
            "additionalProperties": false
          }
          EOF

      - name: Run verify-json (must fail on schema violation)
        id: verify
        uses: ./actions/verify-json
        with:
          json-file: /tmp/fixtures/invalid.json
          schema-file: /tmp/fixtures/schema.json

      - name: Regression — action accepted invalid input
        shell: bash
        run: |
          echo "FAIL: verify-json should have failed on schema-violating input (version: 999) but reported success"
          exit 1

  test-malformed-json:
    name: Test Malformed JSON fails the action
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Create fixtures
        shell: bash
        run: |
          mkdir -p /tmp/fixtures
          printf '{"name":"broken","version":}' > /tmp/fixtures/malformed.json
          cat > /tmp/fixtures/schema.json <<'EOF'
          {
            "$schema": "http://json-schema.org/draft-07/schema#",
            "type": "object",
            "properties": {
              "name":    {"type":"string"},
              "version": {"type":"string"}
            }
          }
          EOF

      - name: Run verify-json (must fail on malformed JSON)
        id: verify
        uses: ./actions/verify-json
        with:
          json-file: /tmp/fixtures/malformed.json
          schema-file: /tmp/fixtures/schema.json

      - name: Regression — action accepted malformed JSON
        shell: bash
        run: |
          echo "FAIL: verify-json should have failed on malformed JSON but reported success"
          exit 1

  test-missing-json-file:
    name: Test Missing json-file fails the action
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Create fixtures
        shell: bash
        run: |
          mkdir -p /tmp/fixtures
          cat > /tmp/fixtures/schema.json <<'EOF'
          {
            "$schema": "http://json-schema.org/draft-07/schema#",
            "type": "object",
            "required": ["name","version","port"],
            "properties": {
              "name":    {"type":"string"},
              "version": {"type":"string"},
              "port":    {"type":"integer","minimum":1,"maximum":65535}
            },
            "additionalProperties": false
          }
          EOF

      - name: Run verify-json (must fail — json-file missing)
        id: verify
        uses: ./actions/verify-json
        with:
          json-file: /tmp/fixtures/does-not-exist.json
          schema-file: /tmp/fixtures/schema.json

      - name: Regression — action accepted a missing json-file
        shell: bash
        run: |
          echo "FAIL: verify-json should have failed when json-file does not exist but reported success"
          exit 1

  test-missing-schema-file:
    name: Test Missing schema-file fails the action
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Create fixtures
        shell: bash
        run: |
          mkdir -p /tmp/fixtures
          cat > /tmp/fixtures/valid.json <<'EOF'
          {"name":"test-service","version":"1.0.0","port":8080}
          EOF

      - name: Run verify-json (must fail — schema-file missing)
        id: verify
        uses: ./actions/verify-json
        with:
          json-file: /tmp/fixtures/valid.json
          schema-file: /tmp/fixtures/does-not-exist.json

      - name: Regression — action accepted a missing schema-file
        shell: bash
        run: |
          echo "FAIL: verify-json should have failed when schema-file does not exist but reported success"
          exit 1