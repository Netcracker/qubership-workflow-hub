name: TEST verify-json

on:
  workflow_dispatch: {}
  pull_request:
    paths:
      - "actions/verify-json/**"
      - ".github/workflows/test-verify-json.yml"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-valid-json:
    name: Test Valid JSON passes validation
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Create fixtures
        shell: bash
        run: |
          mkdir -p /tmp/fixtures
          cat > /tmp/fixtures/valid.json <<'EOF'
          {"name":"test-service","version":"1.0.0","port":8080}
          EOF
          cat > /tmp/fixtures/schema.json <<'EOF'
          {
            "$schema": "http://json-schema.org/draft-07/schema#",
            "type": "object",
            "required": ["name","version","port"],
            "properties": {
              "name":    {"type":"string"},
              "version": {"type":"string"},
              "port":    {"type":"integer","minimum":1,"maximum":65535}
            },
            "additionalProperties": false
          }
          EOF

      - name: Run verify-json
        id: verify
        uses: ./actions/verify-json
        with:
          json-file: /tmp/fixtures/valid.json
          schema-file: /tmp/fixtures/schema.json

      - name: Assert passed with is-valid=0
        shell: bash
        env:
          IS_VALID: ${{ steps.verify.outputs.is-valid }}
        run: |
          if [ "$IS_VALID" != "0" ]; then
            echo "FAIL: expected is-valid=0, got '$IS_VALID'"
            exit 1
          fi
          echo "PASS: is-valid=$IS_VALID"

  test-schema-violation:
    name: Test Schema violation fails the action
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Create fixtures
        shell: bash
        run: |
          mkdir -p /tmp/fixtures
          cat > /tmp/fixtures/invalid.json <<'EOF'
          {"name":"test-service","version":999,"port":99999}
          EOF
          cat > /tmp/fixtures/schema.json <<'EOF'
          {
            "$schema": "http://json-schema.org/draft-07/schema#",
            "type": "object",
            "required": ["name","version","port"],
            "properties": {
              "name":    {"type":"string"},
              "version": {"type":"string"},
              "port":    {"type":"integer","minimum":1,"maximum":65535}
            },
            "additionalProperties": false
          }
          EOF

      - name: Run verify-json (must fail on schema violation)
        id: verify
        continue-on-error: true
        uses: ./actions/verify-json
        with:
          json-file: /tmp/fixtures/invalid.json
          schema-file: /tmp/fixtures/schema.json

      - name: Verify it failed for the right reason
        shell: bash
        env:
          OUTCOME: ${{ steps.verify.outcome }}
        run: |
          if [ "$OUTCOME" != "failure" ]; then
            echo "FAIL: verify-json should have failed on schema-violating input (version: 999) but outcome was '$OUTCOME'"
            exit 1
          fi
          if ! grep -qF "999 is not of type 'string'" "$GITHUB_STEP_SUMMARY"; then
            echo "FAIL: verify-json failed, but not with the expected schema-violation diagnostic"
            echo "--- Step summary content ---"
            cat "$GITHUB_STEP_SUMMARY"
            exit 1
          fi
          echo "PASS: verify-json correctly rejected schema-violating input (999 is not of type 'string')"