name: Update APM packages

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"

permissions:
  contents: read

jobs:
  prepare:
    name: Prepare repositories matrix
    runs-on: ubuntu-latest

    outputs:
      repos: ${{ steps.read-config.outputs.repos }}

    steps:
      - name: Checkout controller repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/download/v4.53.3/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq
          yq --version

      - name: Read repositories config
        id: read-config
        run: |
          REPOS=$(yq -o=json '.repositories | map(select(.enabled != false))' .github/apm-update-repos.yml | jq -c .)
          echo "repos=$REPOS" >> "$GITHUB_OUTPUT"

  update-apm:
    name: Update APM in ${{ matrix.repo.name }}
    needs: prepare
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      max-parallel: 5
      matrix:
        repo: ${{ fromJson(needs.prepare.outputs.repos) }}

    steps:
      - name: Checkout target repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          repository: ${{ matrix.repo.name }}
          ref: ${{ matrix.repo.branch }}
          token: ${{ secrets.APM_UPDATE_TOKEN }}
          path: target-repo
          fetch-depth: 1

      - name: Setup APM
        uses: microsoft/apm-action@ce02c22416172beb70072c5910b2163ee3f006f6  # v1.9.1
        with:
          setup-only: "true"

      - name: Ensure APM target is configured
        working-directory: target-repo
        run: |
          if [ -f apm.yml ]; then
            if ! yq '.targets' apm.yml | grep -q "${{ matrix.repo.target }}"; then
              yq -i '.targets = ["${{ matrix.repo.target }}"]' apm.yml
            fi
          else
            echo "apm.yml not found"
            exit 1
          fi

      - name: Update APM packages
        working-directory: target-repo
        run: |
          echo "::group::Processing ${{ matrix.repo.name }}"
          apm update --yes
          echo "::endgroup::"

      - name: Create Pull Request
        id: create-pr
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1  # v8.1.1
        with:
          token: ${{ secrets.APM_UPDATE_TOKEN }}
          path: target-repo
          base: ${{ matrix.repo.branch }}
          branch: chore/update-apm-packages
          delete-branch: true
          title: "Update APM packages"
          commit-message: "Update APM packages"
          body: |
            This PR updates APM-managed packages using:

            ```bash
            apm update --yes
            ```

            Target repository: `${{ matrix.repo.name }}`
            Target branch: `${{ matrix.repo.branch }}`
            APM target: `${{ matrix.repo.target }}`

            Please review changes in:
            - `apm.yml`
            - `apm.lock.yaml`
            - deployed APM files

      - name: Log result
        run: |
          if [ "${{ steps.create-pr.outputs.pull-request-url }}" != "" ]; then
            echo "::notice title=PR created (${{ matrix.repo.name }})::${{ steps.create-pr.outputs.pull-request-url }}"
            echo "### ${{ matrix.repo.name }}" >> "$GITHUB_STEP_SUMMARY"
            echo "PR created: ${{ steps.create-pr.outputs.pull-request-url }}" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "No changes in ${{ matrix.repo.name }}, PR not created"
            echo "### ${{ matrix.repo.name }}" >> "$GITHUB_STEP_SUMMARY"
            echo "No changes, PR not created" >> "$GITHUB_STEP_SUMMARY"
          fi
