name: TEST apm-packages-update

on:
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  test-apm-update:
    name: Test APM packages update
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          token: ${{ secrets.APM_UPDATE_TOKEN }}
          persist-credentials: false

      - name: Run apm-packages-update action
        uses: netcracker/qubership-workflow-hub/actions/apm-packages-update@781-feat-new-action-and-workflow-for-update-apm-packages-for-all-repositories
        with:
          branch: main
          target: claude
          token: ${{ secrets.APM_UPDATE_TOKEN }}

      - name: Verify job summary
        run: |
          echo "✅ apm-packages-update action completed successfully"
