name: TEST apm-packages-update

on:
  workflow_dispatch:
    inputs:
      branch:
        description: Base branch for the update PR
        required: false
        default: main
        type: string
      target:
        description: Optional APM target override; leave empty to use apm.yml
        required: false
        default: ""
        type: string
      debug:
        description: Print APM and runner diagnostics
        required: false
        default: true
        type: boolean
      dry-run:
        description: Skip pull request creation and run APM in dry-run mode
        required: false
        default: true
        type: boolean

permissions:
  contents: read

jobs:
  test-apm-update:
    name: Test APM packages update
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          token: ${{ secrets.APM_UPDATE_TOKEN }}
          persist-credentials: false

      - name: Run apm-packages-update action
        uses: ./actions/apm-packages-update
        with:
          branch: ${{ inputs.branch }}
          debug: ${{ inputs.debug && 'true' || 'false' }}
          dry-run: ${{ inputs['dry-run'] && 'true' || 'false' }}
          target: ${{ inputs.target }}
          token: ${{ secrets.APM_UPDATE_TOKEN }}

      - name: Verify job summary
        run: |
          echo "✅ apm-packages-update action completed successfully"
